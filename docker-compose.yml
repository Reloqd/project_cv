services:
  nginx:
    build: .
    container_name: cv-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cv.rule=Host(`cv.example.com`)"
      - "traefik.http.routers.cv.entrypoints=web"
      - "traefik.http.services.cv.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
